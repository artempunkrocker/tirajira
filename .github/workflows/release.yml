---
name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Skip release if CI failed
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "CI workflow did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }})"
          echo "Skipping release..."
          exit 0

      # 1. Step: Checkout code from repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

                # Setup Python version from matrix
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      # 2. Step: Cache dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.local/share/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # Install Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.0
          virtualenvs-create: true
          virtualenvs-in-project: false

      # Install project dependencies
      - name: Install dependencies
        run: |
          poetry install

      # 3. Step: Run Python Semantic Release
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PYTHON: python

      # 4. Step: Build package
      - name: Build package
        if: steps.release.outputs.released == 'true'
        run: |
          poetry build

      # 5. Step: Publish to GitHub Release
      - name: Publish to GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 6. Step: Publish to PyPI
      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        run: |
          poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
