---
name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      # 1. Step: Checkout code from repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2. Step: Cache dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.local/share/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # 3. Step: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 4. Step: Install Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      # 5. Step: Install dependencies
      - name: Install dependencies
        run: |
          poetry install

      # 6. Step: Run tests
      - name: Run tests
        run: |
          poetry run pytest

      # 7. Step: Code linting
      - name: Lint with Ruff
        run: |
          poetry run ruff check .

      # 8. Step: Run Python Semantic Release
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PYTHON: python

      # 9. Step: Build package
      - name: Build package
        if: steps.release.outputs.released == 'true'
        run: |
          poetry build

      # 10. Step: Publish to GitHub Release and PyPI
      - name: Publish to GitHub Release and PyPI
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
